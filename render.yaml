# Blueprint Render pour l'API Backend
# Documentation : https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bot-intrepides-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: API_PORT
        value: "10000" # Render utilise PORT de toute façon
      # Variables sensibles : à remplir dans le dashboard Render après création
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true # Render génère une chaîne aléatoire automatiquement
      - key: COOKIE_DOMAIN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
